name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true

    - name: Set up Python 3.12
      run: uv python install 3.12

    - name: Install dependencies
      run: make install

    - name: Lint and Format checking
      run: make format lint

    - name: Model Selection & Training
      # This runs your script that compares 4 models and saves 'best_model.onnx'
      run: uv run python src/ml_system/pipelines/train.py

    - name: Run Model Validation Tests
      # This checks if the ONNX model actually works before finishing
      run: make test

    - name: Upload Production Model
      uses: actions/upload-artifact@v4
      with:
        name: best-onnx-model
        path: models/best_model.onnx
        retention-days: 7

    - name: Upload MLflow Runs
      uses: actions/upload-artifact@v4
      with:
        name: mlflow-tracking-data
        path: |
          mlruns/
          mlflow.db
        retention-days: 7
